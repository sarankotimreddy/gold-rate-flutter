name: Build IPA & APK

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────
  # iOS — unsigned IPA (no codesign)
  # Requires macOS runner (Xcode is macOS-only)
  # ─────────────────────────────────────────
  build_ios:
    name: Build iOS IPA (no codesign)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build IPA (no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Package .app into IPA
        run: |
          mkdir -p build/Payload
          cp -r build/ios/iphoneos/Runner.app build/Payload/Runner.app
          cd build
          zip -r app-no-codesign.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-no-codesign
          path: build/app-no-codesign.ipa

  # ─────────────────────────────────────────
  # Android — release APK (no signing)
  # Runs on Ubuntu for speed & cost
  # ─────────────────────────────────────────
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
