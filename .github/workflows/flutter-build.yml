name: Build IPA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────
  # iOS — unsigned IPA (no codesign)
  # Requires macOS runner (Xcode is macOS-only)
  # ─────────────────────────────────────────
  build_ios:
    name: Build iOS IPA (no codesign)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install

      - name: Build IPA (no codesign)
        run: flutter build ipa --release --no-codesign

      - name: Package .app into IPA
        run: |
          # Try to find the IPA Flutter already produced
          IPA_PATH=$(find build/ios -name "*.ipa" 2>/dev/null | head -n 1)
          if [ -n "$IPA_PATH" ]; then
            echo "Found IPA at: $IPA_PATH"
            cp "$IPA_PATH" build/app-no-codesign.ipa
          else
            echo "No IPA found, packaging manually..."
            APP_PATH=$(find build/ios -name "*.app" 2>/dev/null | head -n 1)
            echo "Found .app at: $APP_PATH"
            mkdir -p build/Payload
            cp -r "$APP_PATH" build/Payload/Runner.app
            cd build
            zip -r app-no-codesign.ipa Payload
          fi

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-no-codesign
          path: build/app-no-codesign.ipa
